<!DOCTYPE html>
<html lang="es">
<head>
     <link rel="shortcut icon" href="bruja.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* Fallback */
            background-image: url('Sprites/cajaF.jpg'); /* Agrega aquí la URL de tu imagen de fondo */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 400px;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        input {
            padding: 1rem;
            margin: 1rem 0;
            width: 100%;
            box-sizing: border-box;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            padding: 1rem 2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #0056b3;
            transform: scale(1.05);
            transition: all 0.2s;
        }
        @media (max-width: 767px) {
            .login-container {
                width: 90vw;
                min-width: auto;
                padding: 2rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            input {
                font-size: 1rem;
                padding: 0.8rem;
            }
            button {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>
      <!-- Si estás leyendo esto, mandale una captura a Fran por wsp -->
    <div class="login-container">
        <h2>Introduce el Código de tu Equipo</h2>
        <form id="loginForm">
            <input type="text" id="codigo" placeholder="Código" required>
            <br>
            <button type="submit">Entrar</button>
        </form>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="banco-fd.js"></script>
</body>
</html>
