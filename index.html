<!DOCTYPE html>
<html lang="es">
<head>
     <link rel="shortcut icon" href="bruja.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inicio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }
        a {
            text-decoration: none;
            flex: 1;
            display: flex;
        }
        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        .blue {
            
        }
        .red {
            
        }
        .button.blue::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('Sprites/logosprogre.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
        }
        .button.red::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('Sprites/banco.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
        }
        .button:hover::before {
            filter: brightness(0.6);
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .button {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="inicio.html"><button class="button blue">Tarjetas de Progesión</button></a>
        <a href="Banco.html"><button class="button red">Banco</button></a>
    </div>
</body>
</html>
