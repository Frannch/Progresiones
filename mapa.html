<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="shortcut icon" href="bruja.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Mapa del Viaje - El Señor de los Anillos</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Permitir scroll si el usuario hace zoom */
            overflow: auto; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            font-size: 2rem;
        }

        .map-container {
            position: relative;
            width: 100%;
            max-height: calc(100vh - 120px);
            aspect-ratio: 1024 / 640; 
            background-image: url('Sprites/mapa.webp');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #d4a574;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: rgba(0, 0, 0, 0.3);
            /* Habilita contenedor de consultas si se quiere usar cqw en el futuro */
            container-type: inline-size; 
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .nodes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 20;
        }

        .node.undiscovered {
            opacity: 0;
            pointer-events: none;
        }

        /* SOLUCIÓN ESCALA: El tamaño del nodo ahora se basa en el ancho de pantalla (vw).
           Se definen límites con min() y max() para que no crezca o encoja infinitamente.
        */
        .node-circle {
            width: max(26px, min(4vw, 48px));
            height: max(26px, min(4vw, 48px));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: calc(1px + 0.1vw) solid #d4a574;
            background: rgba(212, 165, 116, 0.2);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.5);
            overflow: hidden;
        }

        .node-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .node.discovered .node-circle {
            background: rgba(212, 165, 116, 0.8);
            box-shadow: 0 0 25px rgba(212, 165, 116, 1);
        }

        /* Texto proporcional al tamaño de la pantalla */
        .node-label {
            margin-top: 0.5vw;
            text-align: center;
            font-size: max(8px, min(0.9vw, 11px));
            font-weight: bold;
            white-space: nowrap; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            color: #fff;
            background: rgba(0, 0, 0, 0.6); 
            padding: 0.2vw 0.5vw;
            border-radius: 4px;
        }

        .node:hover .node-circle {
            transform: scale(1.15);
        }

        /* Ajuste de escala para las nubes de bloqueo */
        .cloud {
            position: absolute;
            width: max(34px, min(5vw, 70px));
            height: auto;
            opacity: 0.95;
            transition: opacity 0.3s ease;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.5));
        }

        .node.discovered .cloud {
            opacity: 0;
            pointer-events: none;
        }

        /* Aviso de orientación */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-size: 24px;
            padding: 20px;
        }

        .orientation-warning.active {
            display: flex;
        }

        .orientation-warning .emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: rotate 2s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            h1 { font-size: 1.3rem; margin-bottom: 5px; }
            .container {
                width: 100%;
                max-width: none;
            }
            .map-container {
                width: 100vw;
                max-width: none;
                max-height: calc(100vh - 60px);
                overflow: visible; /* Permite scroll interno si se amplía la imagen */
            }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            body {
                display: block;
                padding: 0;
                overflow: hidden;
            }

            .container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vh;
                height: 100vw;
                max-width: none;
                max-height: none;
                justify-content: flex-start;
                align-items: stretch;
                transform: rotate(90deg) translateY(-100vw);
                transform-origin: top left;
            }

            h1 {
                margin-bottom: 6px;
            }

            .map-container {
                width: calc(100% - 10px);
                max-width: none;
                max-height: none;
                aspect-ratio: 1024 / 640;
                height: auto;
            }

            .orientation-warning {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="orientation-warning" id="orientationWarning">
        <div class="emoji">📱</div>
        <p>Por favor gira tu dispositivo</p>
        <p>a orientación horizontal</p>
    </div>
    
    <div class="container">
        <h1>🗺️ El Viaje del Anillo</h1>
        <div class="map-container">
            <div class="nodes-container" id="nodesContainer"></div>
        </div>
    </div>

    <script>
        const nodos = {
            comillo: {
                nombre: 'La Comarca',
                x: 30.43, 
                y: 25.56,  
                emoji: '🏡',
                img: 'Sprites/insignias/Comarca.png',
                descubierto: true
            },
            bree: {
                nombre: 'Bree',
                x: 37.25, 
                y: 25.12,  
                emoji: '🏘️',
                img: 'Sprites/insignias/Bree.png',
                descubierto: true
            },
            Bruinen: {
                nombre: 'Bruinen',
                x: 43.00, 
                y: 25.00,
                emoji: '🏰',
                img: 'Sprites/insignias/Bruinen.png',
                descubierto: true
            },
            Rivendell: {
                nombre: 'Rivendell',
                x: 48.82,
                y: 23.12,
                emoji: '🌳',
                img: 'Sprites/insignias/Rivendell.png',
                descubierto: true
            },
            Caradhras: {
                nombre: 'Caradhras',
                x: 51.75,
                y: 35.75,
                emoji: '⛰️',
                img: 'Sprites/insignias/Caradhras.png',
                descubierto: true
            },
            Moria : {
                nombre: 'Minas Moria',
                x: 45.92,
                y: 40.00,
                emoji: '⛏️',
                img: 'Sprites/insignias/MinasMoria.png',
                descubierto: true
            },
            helm: {
                nombre: 'Abismo de Helm',
                x: 46.87,
                y: 55.87,
                emoji: '🌋',
                img: 'Sprites/insignias/AbismoDeHelm.png',
                descubierto: true
            },
            amon: {
                nombre: 'Amon Hen',
                x: 58.50,
                y: 60.12,
                emoji: '🐎',
                img: 'Sprites/insignias/AmonHen.png',
                descubierto: true
            },
            minasT: {
                nombre: 'Minas Tirith',
                x: 60.40,
                y: 75.18,
                emoji: '🌋',
                img: 'Sprites/insignias/MinasTirith.png',
                descubierto: true
            },
            Tunels: {
                nombre: 'Shelob',
                x: 65.31,
                y: 65.12,
                emoji: '🏯',
                img: 'Sprites/insignias/Shelob.png',
                descubierto: true
            },
            bpuerta: {
                nombre: 'Monte del Destino',
                x: 70.12,
                y: 72.25,
                emoji: '⛏️',
                img: 'Sprites/insignias/MonteDelDestino.png',
                descubierto: true
            }
        };

        function inicializarMapa() {
            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';

            Object.entries(nodos).forEach(([id, nodo]) => {
                const nodeEl = document.createElement('div');
                nodeEl.className = `node ${nodo.descubierto ? 'discovered' : 'undiscovered'}`;
                nodeEl.id = `node-${id}`;
                
                nodeEl.style.left = nodo.x + '%';
                nodeEl.style.top = nodo.y + '%';
                
                nodeEl.innerHTML = `
                    <div class="node-circle">
                        ${nodo.img ? `<img src="${nodo.img}" alt="${nodo.nombre}"/>` : nodo.emoji}
                    </div>
                    <svg class="cloud" viewBox="0 0 80 60">
                        <path d="M 20 40 Q 10 40 10 30 Q 10 15 20 15 Q 25 5 35 5 Q 50 5 55 20 Q 70 20 70 30 Q 70 40 60 40 Z" fill="rgba(100, 100, 100, 0.9)"/>
                    </svg>
                    <div class="node-label">${nodo.nombre}</div>
                `;
                container.appendChild(nodeEl);
            });
        }

        function guardarProgreso() {
            const progreso = {};
            Object.entries(nodos).forEach(([id, nodo]) => {
                progreso[id] = nodo.descubierto;
            });
            localStorage.setItem('mapaProgreso', JSON.stringify(progreso));
        }

        function cargarProgreso() {
            const progreso = localStorage.getItem('mapaProgreso');
            if (progreso) {
                const estado = JSON.parse(progreso);
                Object.entries(estado).forEach(([id, descubierto]) => {
                    if (nodos[id]) {
                        nodos[id].descubierto = descubierto;
                    }
                });
            }
        }

        cargarProgreso();
        inicializarMapa();

        function checkOrientation() {
            const warning = document.getElementById('orientationWarning');
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                if (window.innerHeight > window.innerWidth) {
                    warning.classList.add('active');
                } else {
                    warning.classList.remove('active');
                }
            } else {
                warning.classList.remove('active');
            }
        }

        window.addEventListener('orientationchange', checkOrientation);
        window.addEventListener('resize', checkOrientation);
        checkOrientation();
    </script>
</body>
</html>
